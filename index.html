<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fish Museum">
<meta name="theme-color" content="#08090f">
<link rel="manifest" href="manifest.json">
<title>Fish Museum</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#08090f;font-family:'Inter',sans-serif;color:#fff}
#app{position:relative;width:100%;max-width:430px;margin:0 auto;height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ─── BG AURORA (상단 절반만) ─── */
.bg{position:absolute;inset:0;z-index:0;background:#08090f}
#cv{
  position:absolute;top:0;left:0;
  width:100%;
  /* 상단 45%만 차지 */
  height:45%;
  display:block;
}
/* 캔버스 하단 페이드 */
.bg-fade{
  position:absolute;top:0;left:0;right:0;
  height:55%;
  background:linear-gradient(to bottom,
    transparent 0%,
    transparent 55%,
    rgba(8,9,15,0.75) 72%,
    rgba(8,9,15,0.97) 88%,
    #08090f 100%
  );
  pointer-events:none;
}

/* ─── SCREENS ─── */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.screen.active{display:flex}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:96px}
.scroll::-webkit-scrollbar{display:none}

/* ─── TOP BAR ─── */
.topbar{
  padding:54px 22px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:11px}
.logo-icon{
  width:34px;height:34px;border-radius:9px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.logo-icon svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:1.8}
.logo-words{line-height:1}
.logo-main{font-size:15px;font-weight:500;letter-spacing:-.3px;color:#fff}
.logo-sub{font-size:9px;font-weight:500;letter-spacing:2.5px;color:rgba(255,255,255,0.38);text-transform:uppercase;margin-top:2px}
.avatar{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.avatar svg{width:16px;height:16px;stroke:rgba(255,255,255,0.55);fill:none;stroke-width:1.8}

/* ─── HERO — 레퍼런스처럼 큰 타이틀 ─── */
.hero{padding:28px 22px 0}
.hero-sm{font-size:14px;color:rgba(255,255,255,0.45);margin-bottom:8px;font-weight:400}
.hero-lg{
  font-size:38px;font-weight:500;
  line-height:1.08;letter-spacing:-1.8px;color:#fff;
}
.hero-lg em{font-style:normal;color:rgba(160,190,255,0.85)}

/* ─── SEARCH ─── */
.sw{padding:22px 22px 0}
.sbox{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:12px 16px;
  backdrop-filter:blur(20px);
}
.sbox svg{flex-shrink:0;width:15px;height:15px;stroke:rgba(255,255,255,0.28);fill:none;stroke-width:2}
.sinput{flex:1;background:none;border:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:#fff}
.sinput::placeholder{color:rgba(255,255,255,0.2)}
.sclear{background:none;border:none;color:rgba(255,255,255,0.3);font-size:20px;cursor:pointer;display:none;line-height:1;padding:0}

/* ─── SCANNER ─── */
.scnw{padding:14px 22px 0}
.scnf{
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;overflow:hidden;
  background:rgba(10,12,22,0.55);backdrop-filter:blur(20px);
}
.scnv{position:relative;width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
.scnv img#prev{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.scni{display:flex;flex-direction:column;align-items:center;gap:10px;z-index:1}
.scnr{width:52px;height:52px;border-radius:50%;border:1.5px solid rgba(160,190,255,0.4);display:flex;align-items:center;justify-content:center}
.scnr svg{width:20px;height:20px;stroke:rgba(160,190,255,0.9);fill:none;stroke-width:1.5}
.scnlbl{font-size:13px;font-weight:500;color:rgba(255,255,255,0.45)}
.scnsub{font-size:11px;color:rgba(255,255,255,0.18);letter-spacing:.3px}
.corner{position:absolute;width:15px;height:15px}
.corner.tl{top:11px;left:11px;border-top:1.5px solid rgba(160,190,255,0.6);border-left:1.5px solid rgba(160,190,255,0.6);border-radius:3px 0 0 0}
.corner.tr{top:11px;right:11px;border-top:1.5px solid rgba(160,190,255,0.6);border-right:1.5px solid rgba(160,190,255,0.6);border-radius:0 3px 0 0}
.corner.bl{bottom:11px;left:11px;border-bottom:1.5px solid rgba(160,190,255,0.6);border-left:1.5px solid rgba(160,190,255,0.6);border-radius:0 0 0 3px}
.corner.br{bottom:11px;right:11px;border-bottom:1.5px solid rgba(160,190,255,0.6);border-right:1.5px solid rgba(160,190,255,0.6);border-radius:0 0 3px 0}
.sline{position:absolute;left:0;right:0;height:1.5px;background:linear-gradient(to right,transparent,rgba(160,190,255,0.8),transparent);animation:scanm 2.4s ease-in-out infinite;display:none;z-index:3}
@keyframes scanm{0%{top:10%}50%{top:86%}100%{top:10%}}
.scnft{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-top:1px solid rgba(255,255,255,0.06)}
.sstat{font-size:10px;font-weight:500;letter-spacing:1px;color:rgba(160,190,255,0.4);text-transform:uppercase}
.sbtn{padding:7px 18px;background:rgba(55,100,255,0.9);color:#fff;border:none;border-radius:99px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:none}
.sbtn:disabled{opacity:.35}
.errmsg{margin:8px 22px 0;font-size:13px;color:rgba(255,100,100,0.8);display:none}

/* ─── CTA ─── */
.ctaw{padding:14px 22px 0}
.ctab{
  width:100%;display:flex;align-items:center;gap:14px;
  background:rgba(40,80,255,0.75);
  border:1px solid rgba(100,140,255,0.25);
  border-radius:16px;padding:14px 18px;cursor:pointer;
  position:relative;overflow:hidden;
  backdrop-filter:blur(10px);
}
.ctab::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,0.06),transparent);
  transform:translateX(-100%);animation:sh 3s ease-in-out infinite;
}
@keyframes sh{to{transform:translateX(200%)}}
.ctai{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.14);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ctai svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2}
.ctam{font-size:14px;font-weight:500;color:#fff;letter-spacing:-.2px}
.ctasb{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px}
.ctarr{margin-left:auto;color:rgba(255,255,255,0.35);font-size:18px}

/* ─── RESULT ─── */
.rsec{padding:14px 22px 0;display:none}
.rname{font-size:22px;font-weight:500;color:#fff;letter-spacing:-.4px}
.rlat{font-size:12px;color:rgba(160,190,255,0.8);font-style:italic;margin-top:3px}
.rconf{display:inline-block;margin-top:8px;padding:3px 10px;background:rgba(100,140,255,0.1);border:1px solid rgba(100,140,255,0.22);border-radius:99px;font-size:10px;font-weight:500;letter-spacing:.5px;color:rgba(160,190,255,0.9)}

/* ─── LABELS ─── */
.sec{font-size:10px;font-weight:500;letter-spacing:2.5px;color:rgba(255,255,255,0.2);text-transform:uppercase;padding:16px 22px 10px}

/* ─── CHIPS ─── */
.igrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:0 22px}
.chip{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:11px 8px;text-align:center}
.clbl{font-size:9px;font-weight:500;letter-spacing:1.5px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:4px}
.cval{font-size:12px;font-weight:500;color:rgba(255,255,255,0.85);line-height:1.3}

/* ─── BOXES ─── */
.box{margin:0 22px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px}
.boxt{font-size:13px;color:rgba(255,255,255,0.48);line-height:1.75}
.plain{padding:0 22px;font-size:13px;color:rgba(255,255,255,0.48);line-height:1.75}
.divl{height:1px;background:rgba(255,255,255,0.06);margin:16px 22px}
.trow{display:flex;gap:10px;align-items:flex-start;padding:8px 22px;border-bottom:1px solid rgba(255,255,255,0.04)}
.trow:last-child{border-bottom:none}
.tdot{width:3px;height:3px;border-radius:50%;background:rgba(160,190,255,0.6);margin-top:8px;flex-shrink:0}
.ttxt{font-size:13px;color:rgba(255,255,255,0.48);line-height:1.65;flex:1}
.ghost{display:block;width:calc(100% - 44px);margin:14px 22px 0;padding:12px;background:none;border:1px solid rgba(255,255,255,0.1);border-radius:99px;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:1.5px;color:rgba(255,255,255,0.35);cursor:pointer;text-align:center;text-transform:uppercase}

/* ─── COLLECTION ─── */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 22px}
.ccard{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px;cursor:pointer;backdrop-filter:blur(8px);animation:fu .4s ease both}
.ccard:active{background:rgba(255,255,255,0.09)}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.ce{font-size:28px;margin-bottom:10px}
.cn{font-size:14px;font-weight:500;color:rgba(255,255,255,0.88);letter-spacing:-.2px}
.clat{font-size:10px;color:rgba(255,255,255,0.22);font-style:italic;margin-top:2px}
.cbadge{display:inline-block;margin-top:8px;padding:2px 8px;border:1px solid;border-radius:99px;font-size:9px;font-weight:500;letter-spacing:.5px}
.cprice{font-size:13px;font-weight:500;color:rgba(160,190,255,0.9);margin-top:6px}
.empty{padding:48px 22px;text-align:center}
.empty-i{font-size:30px;opacity:.18;margin-bottom:10px}
.empty-t{font-size:10px;font-weight:500;letter-spacing:2.5px;color:rgba(255,255,255,0.18);text-transform:uppercase}

/* ─── DETAIL ─── */
.backrow{padding:54px 22px 8px;display:flex;align-items:center;gap:8px;cursor:pointer}
.backrow svg{width:18px;height:18px;stroke:rgba(255,255,255,0.38);fill:none;stroke-width:2}
.backlbl{font-size:11px;font-weight:500;letter-spacing:1.5px;color:rgba(255,255,255,0.38);text-transform:uppercase}
.dhero{padding:20px 22px 22px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06)}
.dno{font-size:9px;font-weight:500;letter-spacing:3px;color:rgba(255,255,255,0.18);text-transform:uppercase;margin-bottom:4px}
.demoji{font-size:52px;margin:8px 0}
.dname{font-size:26px;font-weight:500;color:#fff;letter-spacing:-.5px}
.dlatin{font-size:12px;color:rgba(160,190,255,0.8);font-style:italic;margin-top:4px}
.brow{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;justify-content:center}
.b{padding:3px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:99px;font-size:10px;font-weight:500;color:rgba(255,255,255,0.45)}
.b.g{background:rgba(34,197,94,0.07);border-color:rgba(34,197,94,0.2);color:rgba(134,239,172,0.85)}
.b.a{background:rgba(251,191,36,0.07);border-color:rgba(251,191,36,0.2);color:rgba(253,224,71,0.85)}

.buybar{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(8,9,15,0.92);backdrop-filter:blur(20px);padding-bottom:calc(14px + env(safe-area-inset-bottom))}
.plbl{font-size:10px;font-weight:500;color:rgba(255,255,255,0.22);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.pval{font-size:22px;font-weight:500;color:rgba(160,190,255,0.9);letter-spacing:-.5px}
.buybtn{padding:11px 24px;background:rgba(40,80,255,0.9);color:#fff;border:none;border-radius:99px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer}

/* ─── BOTTOM NAV ─── */
.bnav{position:absolute;bottom:0;left:0;right:0;display:flex;border-top:1px solid rgba(255,255,255,0.06);padding-bottom:env(safe-area-inset-bottom);background:rgba(8,9,15,0.92);backdrop-filter:blur(20px);z-index:10}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0;cursor:pointer}
.ni svg{width:19px;height:19px;stroke:rgba(255,255,255,0.18);fill:none;stroke-width:1.5}
.ni.active svg{stroke:#fff}
.nil{font-size:9px;font-weight:500;letter-spacing:1px;color:rgba(255,255,255,0.18);text-transform:uppercase}
.ni.active .nil{color:#fff}
</style>
</head>
<body>
<div id="app">
  <div class="bg">
    <canvas id="cv"></canvas>
    <div class="bg-fade"></div>
  </div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="scroll">
      <div class="topbar">
        <div class="logo">
          <svg width="148" height="34" viewBox="0 0 148 34" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 웨이브 아치 3개 (Museo Moderno 스타일) -->
            <path d="M4 26 C4 26 4 8 11 8 C18 8 18 26 18 26" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M18 26 C18 26 18 8 25 8 C32 8 32 26 32 26" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
            <path d="M32 26 C32 26 32 8 39 8 C46 8 46 26 46 26" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/>
            <!-- teal dot -->
            <circle cx="50" cy="26" r="2.5" fill="rgba(160,190,255,0.9)"/>
            <!-- FISH -->
            <text x="58" y="20" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="white" letter-spacing="1.5">FISH</text>
            <!-- MUSEUM -->
            <text x="58" y="32" font-family="Inter,sans-serif" font-size="9" font-weight="400" fill="rgba(255,255,255,0.38)" letter-spacing="3">MUSEUM</text>
          </svg>
        </div>
        <div class="avatar">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>

      <div class="hero">
        <div class="hero-sm">안녕하세요 👋</div>
        <div class="hero-lg">Discover the<br>world <em>beneath</em><br>the surface</div>
      </div>

      <div class="sw">
        <div class="sbox">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="sinput" id="sinput" type="text" placeholder="물고기 이름 검색 후 엔터..." autocomplete="off" oninput="onSearchFilter(this.value)" onkeydown="if(event.key==='Enter')searchFish(this.value)">
          <button class="sclear" id="sclear" onclick="clearSearch()">×</button>
        </div>
      </div>

      <div class="scnw">
        <div class="scnf">
          <div class="scnv" id="sv" onclick="document.getElementById('fi').click()">
            <img id="prev">
            <div class="scni" id="idle">
              <div class="scnr"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
              <div class="scnlbl">물고기 사진 업로드</div>
              <div class="scnsub">Tap to identify a fish</div>
            </div>
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            <div class="sline" id="sl"></div>
          </div>
          <div class="scnft">
            <span class="sstat" id="ss">Ready</span>
            <button class="sbtn" id="sbt" onclick="event.stopPropagation();scanFish()">Scan</button>
          </div>
        </div>
        <div class="errmsg" id="em"></div>
      </div>

      <div class="ctaw">
        <button class="ctab" onclick="document.getElementById('fi').click()">
          <div class="ctai"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
          <div><div class="ctam">새 물고기 스캔하기</div><div class="ctasb">사진으로 종 자동 인식 →</div></div>
          <span class="ctarr">›</span>
        </button>
      </div>

      <div class="rsec" id="rsec">
        <div class="rname" id="rn"></div>
        <div class="rlat" id="rl"></div>
        <div class="rconf" id="rc"></div>
        <div class="sec" style="padding-top:14px">기본 정보</div>
        <div class="igrid">
          <div class="chip"><div class="clbl">수명</div><div class="cval" id="rv1"></div></div>
          <div class="chip"><div class="clbl">크기</div><div class="cval" id="rv2"></div></div>
          <div class="chip"><div class="clbl">수온</div><div class="cval" id="rv3"></div></div>
          <div class="chip"><div class="clbl">분류</div><div class="cval" id="rv4"></div></div>
          <div class="chip"><div class="clbl">보존</div><div class="cval" id="rv5"></div></div>
          <div class="chip"><div class="clbl">난이도</div><div class="cval" id="rv6"></div></div>
        </div>
        <div class="sec">서식지</div>
        <div class="box"><div class="boxt" id="rh"></div></div>
        <div class="sec">특징 & 생태</div>
        <div class="plain" id="rd"></div>
        <button class="ghost" onclick="resetScan()">+ 다른 물고기 스캔</button>
      </div>

      <div class="sec" id="clbl">내 컬렉션</div>
      <div class="cgrid" id="cgrid"></div>
      <div class="empty" id="emp" style="display:none">
        <div class="empty-i">🔍</div><div class="empty-t">검색 결과 없음</div>
      </div>
    </div>

    <div class="bnav">
      <div class="ni active" onclick="setNav(this)">
        <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span class="nil">Scan</span>
      </div>
      <div class="ni" onclick="setNav(this)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span class="nil">Collection</span>
      </div>
      <div class="ni" onclick="setNav(this)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span class="nil">Habitat</span>
      </div>
      <div class="ni" onclick="setNav(this)">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="nil">Market</span>

/* ══════════════════════════════════════════════════
   AURORA — 애플 뮤직 스타일
   포인트 이동 없음. 알파(밝기)만 sin으로 숨쉬듯 변화.
   레퍼런스 컬러: 좌상 중간파랑, 우상 밝은파랑, 중앙 딥네이비
══════════════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('cv');
  const ctx    = canvas.getContext('2d');
  const app    = document.getElementById('app');

  function resize(){
    canvas.width  = app.offsetWidth  || 390;
    canvas.height = Math.round((app.offsetHeight || 844) * 0.46);
  }
  resize();
  window.addEventListener('resize', resize);

  /* 위치 고정, 알파만 변하는 포인트들
     base: 기준 알파, amp: 진폭, spd: 속도, ph: 위상 */
  const pts = [
    { x:0.20, y:0.15, r:0.85, R:30,  G:60,  B:200, base:0.55, amp:0.25, spd:0.0008, ph:0.0   },
    { x:0.78, y:0.08, r:0.65, R:55,  G:100, B:255, base:0.60, amp:0.20, spd:0.0008, ph:1.5   },
    { x:0.50, y:0.55, r:0.70, R:15,  G:30,  B:110, base:0.40, amp:0.15, spd:0.0008, ph:3.0   },
    { x:0.08, y:0.80, r:0.90, R:18,  G:28,  B:85,  base:0.50, amp:0.18, spd:0.0008, ph:2.0   },
  ];

  let t = 0;

  function draw(){
    const W = canvas.width;
    const H = canvas.height;

    ctx.fillStyle = '#080c20';
    ctx.fillRect(0, 0, W, H);

    pts.forEach(p => {
      const a   = p.base + p.amp * Math.sin(t * p.spd + p.ph);
      const cx  = p.x * W;
      const cy  = p.y * H;
      const rad = p.r * Math.min(W, H);

      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
      g.addColorStop(0,    `rgba(${p.R},${p.G},${p.B},${a})`);
      g.addColorStop(0.45, `rgba(${p.R},${p.G},${p.B},${a * 0.45})`);
      g.addColorStop(0.80, `rgba(${p.R},${p.G},${p.B},${a * 0.10})`);
      g.addColorStop(1,    `rgba(${p.R},${p.G},${p.B},0)`);

      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    });

    /* 하단 페이드 */
    const fade = ctx.createLinearGradient(0, H * 0.5, 0, H);
    fade.addColorStop(0, 'rgba(8,9,15,0)');
    fade.addColorStop(1, 'rgba(8,9,15,1)');
    ctx.fillStyle = fade;
    ctx.fillRect(0, 0, W, H);

    t++;
    requestAnimationFrame(draw);
  }

  draw();
})();

function renderGrid(data){
  data=data||FISH;
  const g=document.getElementById('cgrid'),e=document.getElementById('emp');
  if(!data.length){g.innerHTML='';e.style.display='block';return}
  e.style.display='none';
  g.innerHTML=data.map((f,i)=>`
    <div class="ccard" style="animation-delay:${i*.07}s" data-id="${f.id}">
      ${f.picture
        ? `<div style="width:100%;aspect-ratio:4/3;border-radius:10px;overflow:hidden;margin-bottom:10px;background:rgba(255,255,255,0.05)"><img src="${f.picture}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display='none'"></div>`
        : `<div class="ce">${f.emoji}</div>`
      }
      <div class="cn">${f.koreanName}</div>
      <div class="clat">${f.scientificName}</div>
      <div class="cbadge" style="border-color:${f.waterType==='해수'?'rgba(160,190,255,0.35)':'rgba(134,239,172,0.35)'};color:${f.waterType==='해수'?'rgba(160,190,255,0.85)':'rgba(134,239,172,0.85)'}">${f.waterType}</div>
      <div class="cprice">${f.price}</div>
    </div>`).join('');

  /* 카드 클릭 이벤트 — data-id로 안전하게 */
  g.querySelectorAll('.ccard').forEach(card=>{
    card.addEventListener('click',()=>openDetail(card.dataset.id));
  });
}

/* 타이핑 중 — 컬렉션 내 필터만 */
function onSearchFilter(q){
  document.getElementById('sclear').style.display=q?'block':'none';
  if(!q){document.getElementById('clbl').textContent='내 컬렉션';renderGrid(FISH);return}
  const local=FISH.filter(f=>f.koreanName.includes(q)||f.englishName.toLowerCase().includes(q.toLowerCase())||f.scientificName.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('clbl').textContent='내 컬렉션';
  renderGrid(local.length?local:FISH);
}

/* 엔터 — iNaturalist API 검색 */
async function searchFish(q){
  q=q.trim();if(!q)return;
  const lbl=document.getElementById('clbl');
  lbl.textContent='검색 중...';
  document.getElementById('cgrid').innerHTML=`<div style="grid-column:span 2;padding:32px 0;text-align:center;font-size:13px;color:rgba(255,255,255,0.3);letter-spacing:.5px;">검색 중...</div>`;

  /* 로컬 컬렉션에 있으면 바로 표시 */
  const local=FISH.filter(f=>f.koreanName.includes(q)||f.englishName.toLowerCase().includes(q.toLowerCase())||f.scientificName.toLowerCase().includes(q.toLowerCase()));
  if(local.length){lbl.textContent='검색 결과';renderGrid(local);return;}

  try{
    const res = await fetch(`/api/fish?q=${encodeURIComponent(q)}`);
    if(!res.ok) throw new Error('not found');
    const d = await res.json();

    const lw = (d.habitat||'').toLowerCase()+(d.description||'').toLowerCase();
    const waterType = ['marine','ocean','coral','reef','saltwater','sea'].some(k=>lw.includes(k)) ? '해수'
                    : ['freshwater','river','lake','stream','pond'].some(k=>lw.includes(k)) ? '담수'
                    : '미확인';

    /* 고유 id 생성 */
    const newId = 'u_' + Date.now();

    const fish = {
      id: newId,
      emoji: '🐠',
      koreanName:  d.koreanName  || d.englishName || d.scientificName,
      englishName: d.englishName || '',
      scientificName: d.scientificName || q,
      classification: d.classification || '-',
      lifespan:    d.lifespan    || '-',
      maxSize:     d.maxSize     || '-',
      temperature: d.temperature || '-',
      ph:          d.ph          || '-',
      minTank:     d.minTank     || '-',
      conservationStatus: d.conservationStatus || 'LC',
      difficulty:  d.difficulty  || '중급자',
      waterType,
      price: '시세 확인 중',
      habitat:     d.habitat     || '-',
      description: d.description || '-',
      picture:     d.picture     || null,
      tips: d.tips || ['전문 판매점에 문의해 적정 수조 크기를 확인하세요.','수질 및 수온을 종에 맞게 유지해주세요.'],
    };

    if(!FISH.find(x=>x.scientificName===fish.scientificName)) FISH.unshift(fish);
    lbl.textContent='검색 결과';
    renderGrid([fish]);

  }catch(err){
    lbl.textContent='검색 결과 없음';
    document.getElementById('cgrid').innerHTML=`<div style="grid-column:span 2;padding:32px 0;text-align:center;font-size:13px;color:rgba(255,255,255,0.3);">"${q}" 결과를 찾지 못했어요</div>`;
  }
}

function clearSearch(){
  document.getElementById('sclear').style.display='none';
  document.getElementById('sinput').value='';
  document.getElementById('clbl').textContent='내 컬렉션';
  renderGrid(FISH);
}

function openDetail(id){
  const f=FISH.find(x=>x.id===id);
  if(!f)return;
  document.getElementById('dno').textContent='FISH MUSEUM · #'+f.id;
  document.getElementById('demoji').textContent=f.picture?'':f.emoji;

  /* 상세 이미지 */
  const emojiEl = document.getElementById('demoji');
  if(f.picture){
    emojiEl.innerHTML=`<img src="${f.picture}" style="width:100%;max-height:180px;object-fit:cover;border-radius:12px;margin-bottom:8px" onerror="this.outerHTML='${f.emoji}'">`;
  } else {
    emojiEl.textContent=f.emoji;
  }

  document.getElementById('dname').textContent=f.koreanName;
  document.getElementById('dlatin').textContent=f.scientificName;
  document.getElementById('dprice').textContent=f.price;
  document.getElementById('dhab').textContent=f.habitat;
  document.getElementById('ddesc').textContent=f.description;
  document.getElementById('dbadges').innerHTML=[
    `<span class="b">${f.englishName||'-'}</span>`,
    `<span class="b">${f.classification||'-'}</span>`,
    `<span class="b g">IUCN ${f.conservationStatus||'LC'}</span>`,
    `<span class="b a">${f.waterType||'-'}</span>`,
  ].join('');
  document.getElementById('dinfo').innerHTML=[
    ['수명',f.lifespan],['최대 크기',f.maxSize],['수온',f.temperature],
    ['pH',f.ph],['최소 수조',f.minTank],['난이도',f.difficulty],
  ].map(([l,v])=>`<div class="chip"><div class="clbl">${l}</div><div class="cval">${v||'-'}</div></div>`).join('');
  document.getElementById('dtips').innerHTML=(f.tips||[]).map(t=>`<div class="trow"><div class="tdot"></div><div class="ttxt">${t}</div></div>`).join('');
  showScreen('detail');
}

function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+n).classList.add('active')}
function setNav(el){document.querySelectorAll('.ni').forEach(x=>x.classList.remove('active'));el.classList.add('active')}

let b64=null,btype=null;
document.getElementById('fi').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  btype=file.type||'image/jpeg';
  const r=new FileReader();
  r.onload=ev=>{
    b64=ev.target.result.split(',')[1];
    const p=document.getElementById('prev');p.src=ev.target.result;p.style.display='block';
    document.getElementById('idle').style.display='none';
    document.getElementById('sbt').style.display='block';
    document.getElementById('ss').textContent='Ready to scan';
    document.getElementById('rsec').style.display='none';
    document.getElementById('em').style.display='none';
  };
  r.readAsDataURL(file);
});

async function scanFish(){
  if(!b64)return;
  const btn=document.getElementById('sbt');
  btn.disabled=true;btn.textContent='…';
  document.getElementById('sl').style.display='block';
  document.getElementById('ss').textContent='Identifying...';
  document.getElementById('em').style.display='none';
  document.getElementById('rsec').style.display='none';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:btype,data:b64}},
          {type:'text',text:'You are an expert ichthyologist. Identify this fish. Return ONLY valid JSON:\n{"koreanName":"","englishName":"","scientificName":"","confidence":"높음/중간/낮음","classification":"","lifespan":"","maxSize":"","temperature":"","conservationStatus":"IUCN등급","difficulty":"초보자/중급/고급","waterType":"해수/담수","habitat":"(한국어 2-3문장)","description":"(한국어 3-4문장)"}\nIf no fish, set koreanName to "인식불가".'}
        ]}]})
    });
    const data=await res.json();
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const m=raw.match(/\{[\s\S]*\}/);if(!m)throw new Error('파싱 실패');
    const f=JSON.parse(m[0]);
    if(f.koreanName==='인식불가'){showErr('물고기를 인식하지 못했어요.');return}
    document.getElementById('rn').textContent=f.koreanName;
    document.getElementById('rl').textContent=f.scientificName;
    document.getElementById('rc').textContent=f.englishName+' · 신뢰도 '+f.confidence;
    ['rv1','rv2','rv3','rv4','rv5','rv6'].forEach((id,i)=>{
      document.getElementById(id).textContent=f[['lifespan','maxSize','temperature','classification','conservationStatus','difficulty'][i]]||'-';
    });
    document.getElementById('rh').textContent=f.habitat||'-';
    document.getElementById('rd').textContent=f.description||'-';
    document.getElementById('rsec').style.display='block';
    document.getElementById('ss').textContent='Complete';
    if(!FISH.find(x=>x.scientificName===f.scientificName)){
      FISH.unshift({id:String(Date.now()).slice(-4),emoji:'🐠',koreanName:f.koreanName,englishName:f.englishName,scientificName:f.scientificName,classification:f.classification,lifespan:f.lifespan,maxSize:f.maxSize,temperature:f.temperature,ph:'-',minTank:'-',conservationStatus:f.conservationStatus,difficulty:f.difficulty,waterType:f.waterType||'미확인',price:'시세 확인 중',habitat:f.habitat,description:f.description,tips:['사육 정보 확인 중']});
      renderGrid();
    }
  }catch(err){showErr('오류: '+err.message)}
  finally{document.getElementById('sl').style.display='none';btn.disabled=false;btn.textContent='Scan'}
}
function showErr(msg){
  const el=document.getElementById('em');el.textContent=msg;el.style.display='block';
  document.getElementById('ss').textContent='Error';
  document.getElementById('sbt').disabled=false;document.getElementById('sbt').textContent='Retry';
  document.getElementById('sl').style.display='none';
}
function resetScan(){
  b64=null;
  const p=document.getElementById('prev');p.style.display='none';p.src='';
  document.getElementById('idle').style.display='flex';
  document.getElementById('sbt').style.display='none';
  document.getElementById('rsec').style.display='none';
  document.getElementById('em').style.display='none';
  document.getElementById('ss').textContent='Ready';
  document.getElementById('fi').value='';
}

renderGrid();
